<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dharaa AI Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">
      <div class="logo-mark">
        <div class="logo-icon">🌱</div>
        <div class="logo-name">Dharaa</div>
      </div>
      <div class="logo-sub">Sustainable Farming</div>
    </div>

    <nav>
      <button class="nav-item active" onclick="setPage('dashboard')" id="nav-dashboard">
        <i class="ti ti-layout-dashboard"></i> Dashboard
        <span class="nav-badge" style="display:none;" id="badge-dashboard"></span>
      </button>
      <button class="nav-item" onclick="setPage('florra')" id="nav-florra">
        <i class="ti ti-message-chatbot"></i> Florra AI
      </button>
      <button class="nav-item" onclick="setPage('verify')" id="nav-verify">
        <i class="ti ti-camera"></i> Verify Practice
      </button>
      <button class="nav-item" onclick="setPage('leaderboard')" id="nav-leaderboard">
        <i class="ti ti-trophy"></i> Leaderboard
      </button>
    </nav>

    <div class="sidebar-user">
      <div class="user-avatar">RK</div>
      <div>
        <div class="user-name">Ravi Kumar</div>
        <div class="user-loc">Indore · Level 4</div>
      </div>
      <div class="online-dot"></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <span class="page-title" id="page-title">Dashboard</span>
      </div>
      <div class="topbar-right">
        <div class="points-badge">
          <i class="ti ti-leaf"></i>
          1,240 pts · Level 4
        </div>
        <div class="topbar-icon" title="Notifications">
          <i class="ti ti-bell"></i>
        </div>
        <div class="topbar-icon" title="Settings">
          <i class="ti ti-settings"></i>
        </div>
      </div>
    </div>

    <div class="content" id="content"></div>
  </div>
</div>

  <script src="assets/js/dashboard.js"></script>
</body>
</html>
