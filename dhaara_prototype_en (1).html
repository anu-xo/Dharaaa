<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dharaa — Sustainable Farming</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  :root {
    --green-deep: #1E4D0A;
    --green-mid: #3B6D11;
    --green-bright: #5A9E1A;
    --green-light: #97C459;
    --green-pale: #D6EDBC;
    --green-mist: #EAF3DE;
    --amber: #D4830A;
    --amber-pale: #FEF3DC;
    --blue: #1660A4;
    --blue-pale: #DCECfB;
    --red: #C23232;
    --red-pale: #FCEBEB;
    --soil: #4A2C0A;
    --cream: #FAFAF7;
    --paper: #F4F3EE;
    --ink: #1A1A14;
    --ink-mid: #4A4A3A;
    --ink-faint: #8A8A78;
    --border: #E2E0D5;
    --shadow-sm: 0 1px 3px rgba(30,77,10,0.06), 0 1px 2px rgba(30,77,10,0.04);
    --shadow-md: 0 4px 16px rgba(30,77,10,0.08), 0 2px 6px rgba(30,77,10,0.04);
    --shadow-lg: 0 12px 40px rgba(30,77,10,0.12), 0 4px 12px rgba(30,77,10,0.06);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 18px;
    --radius-xl: 24px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(90,158,26,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(30,77,10,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    display: flex;
    height: 100vh;
    position: relative;
    z-index: 1;
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width: 220px;
    background: var(--green-deep);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .sidebar::before {
    content: '';
    position: absolute;
    bottom: -60px;
    right: -60px;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(90,158,26,0.2) 0%, transparent 70%);
    pointer-events: none;
  }

  .sidebar::after {
    content: '🌿';
    position: absolute;
    bottom: 80px;
    right: -10px;
    font-size: 100px;
    opacity: 0.06;
    transform: rotate(-20deg);
    pointer-events: none;
  }

  .logo {
    padding: 22px 20px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .logo-mark {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, var(--green-bright), var(--green-light));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  .logo-name {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.3px;
  }

  .logo-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding-left: 42px;
  }

  nav { padding: 12px 10px; flex: 1; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    font-size: 13.5px;
    font-weight: 400;
    cursor: pointer;
    color: rgba(255,255,255,0.5);
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    border-radius: var(--radius-md);
    transition: all 0.2s ease;
    font-family: 'DM Sans', sans-serif;
    margin-bottom: 2px;
    position: relative;
  }

  .nav-item i { font-size: 17px; }

  .nav-item:hover {
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.8);
  }

  .nav-item.active {
    background: linear-gradient(135deg, rgba(90,158,26,0.4), rgba(90,158,26,0.2));
    color: #fff;
    font-weight: 500;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }

  .nav-item.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 20%;
    height: 60%;
    width: 3px;
    background: var(--green-light);
    border-radius: 0 2px 2px 0;
  }

  .nav-badge {
    margin-left: auto;
    font-size: 10px;
    background: var(--green-bright);
    color: #fff;
    padding: 2px 6px;
    border-radius: 10px;
    font-weight: 600;
  }

  .sidebar-user {
    padding: 14px 16px;
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .user-avatar {
    width: 34px;
    height: 34px;
    background: linear-gradient(135deg, var(--green-bright), var(--green-light));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }

  .user-name { font-size: 13px; font-weight: 500; color: #fff; }
  .user-loc { font-size: 11px; color: rgba(255,255,255,0.4); }

  .online-dot {
    width: 7px;
    height: 7px;
    background: var(--green-light);
    border-radius: 50%;
    margin-left: auto;
    flex-shrink: 0;
    box-shadow: 0 0 6px var(--green-light);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ===== MAIN ===== */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--cream);
  }

  .topbar {
    padding: 0 28px;
    height: 60px;
    background: var(--cream);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  .topbar-left { display: flex; align-items: center; gap: 12px; }

  .page-title {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.2px;
  }

  .topbar-right { display: flex; align-items: center; gap: 12px; }

  .points-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--green-mist);
    border: 1px solid var(--green-pale);
    color: var(--green-mid);
    font-size: 12px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 20px;
  }

  .topbar-icon {
    width: 34px;
    height: 34px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-faint);
    cursor: pointer;
    font-size: 16px;
    transition: all 0.2s;
    background: #fff;
  }

  .topbar-icon:hover { background: var(--green-mist); color: var(--green-mid); border-color: var(--green-pale); }

  .content {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
    scroll-behavior: smooth;
  }

  .content::-webkit-scrollbar { width: 4px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .page-enter { animation: fadeUp 0.3s ease forwards; }

  /* ===== DASHBOARD ===== */
  .section-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
  }

  .section-link {
    font-size: 12px;
    color: var(--green-mid);
    cursor: pointer;
    font-weight: 500;
  }

  .metric-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }

  .metric-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .metric-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .metric-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .metric-card:hover::before { opacity: 1; }
  .metric-card.green-accent::before { background: linear-gradient(90deg, var(--green-mid), var(--green-bright)); }
  .metric-card.blue-accent::before { background: linear-gradient(90deg, var(--blue), #4EAEFF); }
  .metric-card.amber-accent::before { background: linear-gradient(90deg, var(--amber), #F5C46B); }

  .metric-icon {
    width: 36px;
    height: 36px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    margin-bottom: 10px;
  }

  .metric-icon.green { background: var(--green-mist); color: var(--green-mid); }
  .metric-icon.blue { background: var(--blue-pale); color: var(--blue); }
  .metric-icon.amber { background: var(--amber-pale); color: var(--amber); }
  .metric-icon.fire { background: #FFF0E0; color: #D4630A; }

  .metric-label { font-size: 11.5px; color: var(--ink-faint); margin-bottom: 4px; font-weight: 400; }
  .metric-val { font-size: 24px; font-weight: 600; line-height: 1; margin-bottom: 5px; }
  .metric-val.green { color: var(--green-mid); }
  .metric-val.blue { color: var(--blue); }
  .metric-val.amber { color: var(--amber); }
  .metric-val.fire { color: #D4630A; }

  .metric-delta {
    font-size: 11.5px;
    color: var(--green-bright);
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .metric-delta.neutral { color: var(--ink-faint); }

  .row2 {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }

  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    padding: 18px;
    box-shadow: var(--shadow-sm);
  }

  .card-title {
    font-family: 'Fraunces', serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .card-title i { font-size: 15px; color: var(--green-bright); }

  .score-ring { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
  .ring-wrap { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-center {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
  }
  .ring-num { font-size: 20px; font-weight: 700; color: var(--green-mid); font-family: 'Fraunces', serif; }
  .ring-of { font-size: 10px; color: var(--ink-faint); }

  .score-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    font-weight: 600;
    color: var(--green-mid);
    background: var(--green-mist);
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 5px;
  }

  .score-hint { font-size: 12px; color: var(--ink-faint); line-height: 1.5; }
  .score-hint strong { color: var(--ink-mid); font-weight: 500; }

  .bar-section { margin-top: 2px; }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 9px;
  }
  .bar-label { font-size: 12px; color: var(--ink-faint); width: 90px; flex-shrink: 0; }
  .bar-bg {
    flex: 1; height: 7px;
    background: var(--paper);
    border-radius: 4px; overflow: hidden;
  }
  .bar-fill {
    height: 100%; border-radius: 4px;
    transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .bar-pct { font-size: 11.5px; color: var(--ink-mid); width: 30px; text-align: right; font-weight: 500; }

  .streak-label {
    font-size: 11px;
    color: var(--ink-faint);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }

  .streak-row { display: flex; gap: 7px; margin-bottom: 14px; }
  .streak-day {
    flex: 1;
    height: 38px;
    border-radius: var(--radius-sm);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 9.5px;
    font-weight: 600;
    gap: 2px;
    transition: all 0.2s;
  }

  .streak-day span { font-size: 12px; }
  .streak-done { background: var(--green-mist); color: var(--green-mid); }
  .streak-miss { background: var(--paper); color: var(--ink-faint); }
  .streak-today {
    background: linear-gradient(135deg, var(--green-mid), var(--green-bright));
    color: #fff;
    box-shadow: 0 4px 12px rgba(59,109,17,0.3);
    transform: scale(1.05);
  }

  .streak-info {
    background: linear-gradient(135deg, var(--green-mist), #F0F7E8);
    border: 1px solid var(--green-pale);
    border-radius: var(--radius-md);
    padding: 10px 12px;
    font-size: 12px;
    color: var(--ink-mid);
    line-height: 1.6;
  }

  .streak-info strong { color: var(--green-mid); }

  .activity-list { margin-top: 14px; }
  .activity-label {
    font-size: 11px;
    color: var(--ink-faint);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 10px;
  }

  .activity-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
  }
  .activity-item:last-child { border-bottom: none; padding-bottom: 0; }

  .act-icon {
    width: 28px; height: 28px;
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0;
  }
  .act-icon.green { background: var(--green-mist); color: var(--green-mid); }
  .act-icon.amber { background: var(--amber-pale); color: var(--amber); }
  .act-icon.red { background: var(--red-pale); color: var(--red); }

  .activity-text { font-size: 12.5px; color: var(--ink-mid); line-height: 1.4; flex: 1; }
  .activity-text strong { color: var(--ink); font-weight: 500; }
  .activity-time { font-size: 11px; color: var(--ink-faint); white-space: nowrap; }

  .alert-card {
    background: linear-gradient(135deg, #FFF8EE, var(--amber-pale));
    border: 1px solid #FDDCAA;
    border-radius: var(--radius-xl);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }

  .alert-icon {
    width: 40px; height: 40px;
    background: #fff;
    border: 1px solid #FDDCAA;
    border-radius: var(--radius-md);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
    color: var(--amber);
  }

  .alert-title { font-size: 13.5px; font-weight: 600; color: #7A4800; margin-bottom: 2px; }
  .alert-sub { font-size: 12px; color: var(--ink-mid); line-height: 1.4; }

  .btn {
    padding: 8px 16px;
    border: none;
    border-radius: var(--radius-md);
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s ease;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--green-mid), var(--green-bright));
    color: #fff;
    box-shadow: 0 2px 8px rgba(59,109,17,0.2);
    white-space: nowrap;
    margin-left: auto;
    flex-shrink: 0;
  }

  .btn-primary:hover {
    box-shadow: 0 4px 14px rgba(59,109,17,0.3);
    transform: translateY(-1px);
  }

  .btn-outline {
    background: transparent;
    color: var(--green-mid);
    border: 1.5px solid var(--green-pale);
  }

  .btn-outline:hover { background: var(--green-mist); }

  /* ===== FLORRA CHAT ===== */
  .chat-wrap {
    display: flex;
    flex-direction: column;
    height: 100%;
    max-width: 680px;
  }

  .chat-header {
    background: linear-gradient(135deg, var(--green-deep), var(--green-mid));
    border-radius: var(--radius-xl);
    padding: 16px 20px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: var(--shadow-md);
    position: relative;
    overflow: hidden;
  }

  .chat-header::after {
    content: '🌿';
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 48px;
    opacity: 0.1;
  }

  .florra-avatar {
    width: 44px; height: 44px;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 20px;
    flex-shrink: 0;
  }

  .florra-name {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 600;
    color: #fff;
  }

  .florra-status {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    margin-top: 2px;
  }

  .status-dot {
    width: 7px; height: 7px;
    background: var(--green-light);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--green-light);
    animation: pulse 2s infinite;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-right: 6px;
    padding-bottom: 4px;
  }

  .chat-messages::-webkit-scrollbar { width: 3px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg { max-width: 76%; animation: fadeUp 0.2s ease; }
  .msg.user { align-self: flex-end; }
  .msg.bot { align-self: flex-start; }

  .msg-bubble {
    padding: 10px 14px;
    border-radius: var(--radius-lg);
    font-size: 13.5px;
    line-height: 1.55;
  }

  .msg.user .msg-bubble {
    background: linear-gradient(135deg, var(--green-mid), var(--green-bright));
    color: #fff;
    border-bottom-right-radius: 5px;
    box-shadow: 0 3px 12px rgba(59,109,17,0.25);
  }

  .msg.bot .msg-bubble {
    background: #fff;
    border: 1px solid var(--border);
    color: var(--ink);
    border-bottom-left-radius: 5px;
    box-shadow: var(--shadow-sm);
  }

  .msg-time {
    font-size: 10.5px;
    color: var(--ink-faint);
    margin-top: 4px;
    padding: 0 5px;
  }
  .msg.user .msg-time { text-align: right; }

  .quick-q {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin: 10px 0;
  }

  .quick-chip {
    font-size: 12px;
    padding: 6px 13px;
    border: 1.5px solid var(--green-pale);
    color: var(--green-mid);
    border-radius: 20px;
    background: var(--green-mist);
    cursor: pointer;
    white-space: nowrap;
    font-weight: 500;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .quick-chip:hover {
    background: var(--green-pale);
    border-color: var(--green-light);
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(59,109,17,0.15);
  }

  .chat-input-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    align-items: center;
  }

  .chat-input-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 0 14px;
    gap: 8px;
    transition: border-color 0.2s;
  }

  .chat-input-wrap:focus-within { border-color: var(--green-mid); box-shadow: 0 0 0 3px rgba(59,109,17,0.08); }
  .chat-input-wrap i { color: var(--ink-faint); font-size: 16px; flex-shrink: 0; }

  .chat-input-wrap input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 13.5px;

function renderFlorra() {
  document.getElementById('content').innerHTML = `
    <div class="page-enter chat-wrap" style="height:calc(100vh - 60px - 48px);">
      <div class="chat-header">
        <div class="florra-avatar"><i class="ti ti-plant"></i></div>
        <div>
          <div class="florra-name">Florra</div>
          <div class="florra-status"><div class="status-dot"></div> AI Agriculture Assistant · Online</div>
        </div>
      </div>

      <div class="chat-messages" id="chat-msgs"></div>

      <div class="quick-q" id="quick-qs">
        <span class="quick-chip" onclick="sendQuick('Why are my crops turning yellow?')">🌾 Yellow crops</span>
        <span class="quick-chip" onclick="sendQuick('What is the best crop for Kharif season in Madhya Pradesh?')">🌧️ Kharif crop advice</span>
        <span class="quick-chip" onclick="sendQuick('How can I reduce water usage in my wheat field?')">💧 Save water</span>
        <span class="quick-chip" onclick="sendQuick('What is the best organic fertilizer for wheat?')">🌿 Fertilizer advice</span>
      </div>

      <div class="chat-input-row">
        <div class="chat-input-wrap">
          <i class="ti ti-message-circle"></i>
          <input type="text" id="chat-input" placeholder="Ask Florra anything about your farm..." onkeydown="if(event.key==='Enter')sendChat()"/>
        </div>
        <button class="send-btn" id="send-btn" onclick="sendChat()"><i class="ti ti-send"></i></button>
      </div>
    </div>
  `;
  renderMessages();
}

function renderMessages() {
  const el = document.getElementById('chat-msgs');
  if (!el) return;
  el.innerHTML = chatMessages.map(m => `
    <div class="msg ${m.role === 'user' ? 'user' : 'bot'}">
      <div class="msg-bubble">${m.text}</div>
      <div class="msg-time">${m.time}</div>
    </div>
  `).join('');
  if (isTyping) {
    el.innerHTML += `<div class="msg bot"><div class="typing"><div class="dot-anim"></div><div class="dot-anim"></div><div class="dot-anim"></div></div></div>`;
  }
  el.scrollTop = el.scrollHeight;
}

function sendQuick(q) {
  document.getElementById('chat-input').value = q;
  sendChat();
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || isTyping) return;
  input.value = '';
  const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  chatMessages.push({ role: 'user', text, time: now });
  isTyping = true;
  renderMessages();
  document.getElementById('send-btn').disabled = true;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `You are Florra, an AI agriculture assistant for Dharaa — a sustainable farming platform in India. The farmer is Ravi Kumar from Indore, Madhya Pradesh, India. He grows wheat and soybean.

Give practical, localized, concise advice in clear English. Keep responses 3-5 sentences. Focus on sustainability, water efficiency, and crop health. Be warm, encouraging, and use language a farmer can easily understand. Add relevant emojis. Address him as "Ravi" occasionally.`,
        messages: chatMessages.filter(m => m.role === 'user').map(m => ({ role: 'user', content: m.text }))
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Sorry, something went wrong. Please try again.';
    isTyping = false;
    chatMessages.push({ role: 'bot', text: reply, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
  } catch (e) {
    isTyping = false;
    chatMessages.push({ role: 'bot', text: '🔴 Network error. Please check your connection and try again.', time: 'Just now' });
  }
  renderMessages();
  if (document.getElementById('send-btn')) document.getElementById('send-btn').disabled = false;
}

            ${['JPG/JPEG','PNG','HEIC','WebP'].map(f => `<span style="font-size:12px;padding:4px 10px;background:var(--paper);border:1px solid var(--border);border-radius:6px;color:var(--ink-mid);">${f}</span>`).join('')}

        </div>

      <div class="analysis-card" id="analysis-box" style="display:none;animation:fadeUp 0.3s ease;">
        <div class="analysis-title"><i class="ti ti-robot" style="color:var(--green-bright);"></i> AI Analysis Result</div>
        <div class="analysis-row">
          <span class="analysis-label">Practice detected</span>
          <span class="badge badge-good"><i class="ti ti-check"></i> Drip Irrigation</span>
        </div>
        <div class="analysis-row">
          <span class="analysis-label">Crop health</span>
          <span class="badge badge-good"><i class="ti ti-check"></i> Healthy</span>
        </div>
        <div class="analysis-row">
          <span class="analysis-label">Water efficiency</span>
          <span class="badge badge-good"><i class="ti ti-check"></i> Efficient</span>
        </div>
        <div class="analysis-row">
          <span class="analysis-label">Soil coverage</span>
          <span class="badge badge-warn"><i class="ti ti-alert-circle"></i> Mulching recommended</span>
        </div>
        <div class="analysis-tip">
          💡 <strong>Suggestion:</strong> Apply organic mulch around plant bases — this can reduce soil moisture evaporation by up to 25%.
        </div>
        <div class="pts-earned">
          <i class="ti ti-coin" style="font-size:18px;"></i>
          +35 sustainability points earned — Drip Irrigation verified!
        </div>
        <button class="btn btn-outline" style="width:100%;margin-top:10px;justify-content:center;display:flex;align-items:center;gap:5px;" onclick="setPage('florra')">
          <i class="ti ti-message-chatbot"></i> Get advice from Florra
        </button>
      </div>

      <!-- Empty state for analysis -->
      <div class="analysis-card" id="analysis-empty" style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:300px;">
        <div style="font-size:48px;margin-bottom:12px;opacity:0.3;">🔍</div>
        <div style="font-size:14px;color:var(--ink-faint);line-height:1.6;">Upload an image and<br>AI analysis will appear here</div>
      </div>
    </div>
  `;
}

function simulateUpload() {
  const zone = document.getElementById('upload-zone');
  const box = document.getElementById('analysis-box');
  const empty = document.getElementById('analysis-empty');
  zone.innerHTML = `
    <div class="upload-icon-wrap" style="background:var(--amber-pale);">
      <i class="ti ti-loader spin" style="color:var(--amber);font-size:28px;"></i>
    </div>
    <div style="font-size:14px;font-weight:500;color:var(--ink-mid);margin-top:10px;">Analyzing image...</div>
    <div style="font-size:12px;color:var(--ink-faint);margin-top:4px;">AI is examining your farming practice</div>
  `;
  zone.style.pointerEvents = 'none';
  setTimeout(() => {
    zone.innerHTML = `
      <div class="upload-icon-wrap" style="background:var(--green-mist);">
        <i class="ti ti-check" style="color:var(--green-mid);font-size:28px;"></i>
      </div>
      <div style="font-size:14px;font-weight:600;color:var(--green-mid);margin-top:10px;">✅ Image analyzed!</div>
      <div style="font-size:12px;color:var(--ink-faint);margin-top:4px;">See results here →</div>
    `;
    empty.style.display = 'none';
    box.style.display = 'block';
  }, 1800);
}

        <div>

setPage('dashboard');

const style = document.createElement('style');
style.textContent = '@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}';
